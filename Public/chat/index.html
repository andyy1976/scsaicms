<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI客服 - OpenClaw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; height: 100vh; overflow: hidden; }
        .chat-container { max-width: 100%; height: 100vh; display: flex; flex-direction: column; background: #fff; }
        
        /* Header */
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .chat-header .avatar { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .chat-header .info h2 { font-size: 15px; font-weight: 500; }
        .chat-header .info .status { font-size: 12px; opacity: 0.85; }
        
        /* Context bar */
        .context-bar { background: #f0f4ff; border-bottom: 1px solid #e0e8ff; padding: 8px 12px; font-size: 12px; color: #667; display: none; flex-shrink: 0; }
        .context-bar.show { display: flex; align-items: center; gap: 6px; }
        .context-bar .ctx-icon { font-size: 14px; }
        .context-bar .ctx-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .context-bar .ctx-close { cursor: pointer; opacity: 0.5; font-size: 14px; }
        .context-bar .ctx-close:hover { opacity: 1; }
        
        /* Messages */
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: #f8f9fa; }
        .message { margin-bottom: 14px; display: flex; gap: 8px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .message.user { flex-direction: row-reverse; }
        .message .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .message.bot .avatar { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .message.user .avatar { background: #ddd; }
        .message .bubble { max-width: 78%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .message.bot .bubble { background: #fff; border: 1px solid #e0e0e0; border-radius: 16px 16px 16px 4px; }
        .message.user .bubble { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-radius: 16px 16px 4px 16px; }
        .message .time { font-size: 10px; color: #aaa; margin-top: 3px; }
        .message.user .time { text-align: right; }
        
        /* Product card */
        .product-card { background: #f5f7ff; border: 1px solid #e0e8ff; border-radius: 10px; padding: 10px; margin-top: 8px; display: flex; gap: 10px; cursor: pointer; transition: background 0.2s; }
        .product-card:hover { background: #edf1ff; }
        .product-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .product-card .pinfo { flex: 1; min-width: 0; }
        .product-card .pinfo h4 { font-size: 13px; margin-bottom: 3px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .product-card .pinfo p { font-size: 12px; color: #666; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Quick actions */
        .quick-actions { padding: 8px 12px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
        .quick-btn { padding: 5px 12px; background: #f0f2ff; border: 1px solid #d0d8ff; border-radius: 20px; font-size: 12px; cursor: pointer; color: #555; transition: all 0.2s; }
        .quick-btn:hover { background: #667eea; color: #fff; border-color: #667eea; }
        
        /* Input */
        .chat-input { padding: 12px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
        .chat-input textarea { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 10px 14px; font-size: 14px; resize: none; outline: none; max-height: 80px; font-family: inherit; }
        .chat-input textarea:focus { border-color: #667eea; }
        .chat-input button { width: 42px; height: 42px; border-radius: 50%; border: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; transition: transform 0.2s; }
        .chat-input button:hover { transform: scale(1.08); }
        .chat-input button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        
        /* Typing */
        .typing { display: flex; gap: 4px; padding: 12px 16px; }
        .typing span { width: 7px; height: 7px; background: #999; border-radius: 50%; animation: typing 1s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-4px); } }
        
        /* Mobile */
        @media (max-width: 480px) { .message .bubble { max-width: 88%; } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🦞</div>
            <div class="info">
                <h2>AI智能客服</h2>
                <div class="status" id="statusDot">正在连接...</div>
            </div>
        </div>
        
        <!-- Page context bar -->
        <div class="context-bar" id="contextBar">
            <span class="ctx-icon">📄</span>
            <span class="ctx-text" id="contextText"></span>
            <span class="ctx-close" onclick="clearContext()">✕</span>
        </div>
        
        <div class="chat-messages" id="messages">
            <div class="message bot">
                <div class="avatar">🦞</div>
                <div>
                    <div class="bubble">您好！我是AI智能客服小智，可以根据您当前浏览的页面内容为您提供精准服务。请问有什么可以帮您？</div>
                    <div class="time">刚刚</div>
                </div>
            </div>
        </div>
        
        <div class="quick-actions" id="quickActions">
            <button class="quick-btn" onclick="sendQuick('产品介绍')">产品介绍</button>
            <button class="quick-btn" onclick="sendQuick('价格咨询')">价格咨询</button>
            <button class="quick-btn" onclick="sendQuick('技术支持')">技术支持</button>
            <button class="quick-btn" onclick="sendQuick('转人工')">转人工</button>
        </div>
        
        <div class="chat-input">
            <textarea id="inputMessage" placeholder="输入您的问题..." rows="1" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
            <button id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>
    
    <script>
    // Config
    const CONFIG = {
        apiUrl: '/index.php?s=ai/chat',
        sessionId: 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
        pageContext: null
    };
    
    let isTyping = false;
    
    // ==================== Page Context Detection ====================
    function detectPageContext() {
        try {
            // Try to get context from parent frame (same origin)
            const parentDoc = window.parent.document;
            
            let title = '';
            let keywords = '';
            let summary = '';
            
            // 1. Try meta tags
            const metaTitle = parentDoc.querySelector('meta[property="og:title"]') 
                || parentDoc.querySelector('meta[name="title"]')
                || parentDoc.querySelector('title');
            const metaKeywords = parentDoc.querySelector('meta[name="keywords"]');
            const metaDesc = parentDoc.querySelector('meta[name="description"]');
            
            // 2. Try common article selectors
            const articleTitle = parentDoc.querySelector('.article-title, .article-h1, h1.title, .content-title, h1')
                || parentDoc.querySelector('[class*="title"]');
            const articleContent = parentDoc.querySelector('.article-content, .article-body, .content-body, #content')
                || parentDoc.querySelector('[class*="content"]');
            
            // 3. Fallback to page title
            if (!title && metaTitle) {
                title = metaTitle.content || metaTitle.innerText || metaTitle.textContent || '';
            }
            if (!title && articleTitle) {
                title = articleTitle.innerText || articleTitle.textContent || '';
            }
            
            keywords = metaKeywords ? (metaKeywords.content || metaKeywords.getAttribute('content') || '') : '';
            summary = metaDesc ? (metaDesc.content || metaDesc.getAttribute('content') || '') : '';
            
            // Try to get article body text (first 300 chars)
            if (articleContent && !summary) {
                summary = (articleContent.innerText || articleContent.textContent || '').substring(0, 300).trim();
            }
            
            // Clean up title (remove site name)
            title = title.replace(/[|_-].*$/, '').replace(/[-_]*.{4,}$/, '').trim();
            
            if (title || keywords) {
                CONFIG.pageContext = {
                    title: title.substring(0, 200),
                    keywords: keywords.substring(0, 300),
                    summary: summary.substring(0, 400)
                };
                
                // Show context bar
                const bar = document.getElementById('contextBar');
                const text = document.getElementById('contextText');
                if (bar && CONFIG.pageContext.title) {
                    text.textContent = '当前页面: ' + CONFIG.pageContext.title.substring(0, 40);
                    bar.classList.add('show');
                }
            }
        } catch (e) {
            // Cross-origin or no parent, that's fine
            CONFIG.pageContext = null;
        }
    }
    
    function clearContext() {
        CONFIG.pageContext = null;
        document.getElementById('contextBar').classList.remove('show');
    }
    
    // Detect on load
    detectPageContext();
    
    // ==================== Chat Functions ====================
    async function sendMessage() {
        const input = document.getElementById('inputMessage');
        const message = input.value.trim();
        if (!message || isTyping) return;
        
        appendMessage('user', message);
        input.value = '';
        input.style.height = 'auto';
        showTyping();
        isTyping = true;
        
        try {
            // Build payload with context
            const payload = {
                message: message,
                session_id: CONFIG.sessionId
            };
            
            // Attach page context if available
            if (CONFIG.pageContext) {
                payload.context = {
                    page_title: CONFIG.pageContext.title,
                    page_keywords: CONFIG.pageContext.keywords,
                    page_summary: CONFIG.pageContext.summary,
                    page_url: window.parent.location.href || ''
                };
            }
            
            const response = await fetch(CONFIG.apiUrl + '&message=' + encodeURIComponent(message) + '&session_id=' + encodeURIComponent(CONFIG.sessionId), {
                method: 'GET'
            });
            
            const data = await response.json();
            hideTyping();
            isTyping = false;
            
            if (data.success) {
                appendMessage('bot', data.reply || data.message || '收到！');
                
                if (data.products && data.products.length > 0) {
                    appendProductCards(data.products);
                }
            } else {
                appendMessage('bot', '抱歉，服务暂时不可用，请稍后再试。');
            }
        } catch (error) {
            hideTyping();
            isTyping = false;
            appendMessage('bot', '网络错误，请检查网络连接。');
        }
    }
    
    function sendQuick(text) {
        document.getElementById('inputMessage').value = text;
        sendMessage();
    }
    
    function appendMessage(type, content) {
        const messagesDiv = document.getElementById('messages');
        const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        
        // Convert markdown-like formatting
        content = content
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\n/g, '<br>');
        
        const html = `
            <div class="message ${type}">
                <div class="avatar">${type === 'bot' ? '🦞' : '👤'}</div>
                <div>
                    <div class="bubble">${content}</div>
                    <div class="time">${time}</div>
                </div>
            </div>`;
        
        messagesDiv.insertAdjacentHTML('beforeend', html);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function appendProductCards(products) {
        const messagesDiv = document.getElementById('messages');
        const cards = products.map(p => `
            <div class="product-card" onclick="window.open('${p.url || '#'}', '_blank')">
                <img src="${p.image || '/Public/Uploads/uploadfile/images/default.png'}" alt="${p.title}">
                <div class="pinfo">
                    <h4>${p.title}</h4>
                    <p>${p.description || ''}</p>
                </div>
            </div>`).join('');
        
        messagesDiv.insertAdjacentHTML('beforeend', `
            <div class="message bot">
                <div class="avatar">🦞</div>
                <div><div class="bubble">${cards}</div></div>
            </div>`);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function showTyping() {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.insertAdjacentHTML('beforeend', `
            <div class="message bot" id="typingIndicator">
                <div class="avatar">🦞</div>
                <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
            </div>`);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        updateStatus('对方正在输入...');
    }
    
    function hideTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
        updateStatus('在线');
    }
    
    function updateStatus(text) {
        const el = document.getElementById('statusDot');
        if (el) el.textContent = text;
    }
    
    // Auto-resize textarea
    document.getElementById('inputMessage').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 80) + 'px';
    });
    
    // Update status on load
    updateStatus('在线');
    </script>
</body>
</html>
