<!--登录弹层-->
<div class="box-dl" style="display: none;">
	<div class="register dl-login">
		<div class="reg-block">
		<div class="caption"><h3>用户登录</h3>
		<span class="pul-close"><img src="__TMPL__/images/modal-close.png" width="18"></span>
		</div>
		<div class="reg-list">
			<form role="form" action="{:U('member/dologin')}" method="post">
				<div class="reg-info">
					<div class="name"><font>*</font>用户名：</div>
					<div class="rit-input"><input type="text" name="username" placeholder="请输入用户名"></div>
				</div>
				<div class="reg-info">
					<div class="name"><font>*</font>密码：</div>
					<div class="rit-input"><input type="password" name="userpwd"  placeholder="请输入密码"></div>
				</div>
					  <EGT name="_SESSION['err_number']" value="3">
					  	<div class="reg-info">
					  <div class="name"><font>*</font>密码：</div>
					   	<div class="rit-input">
						 <input type="text" name="verify"  placeholder="输入下面验证码"> 
						<img src="{:U('Member/verify')}" border="0" alt="看不清楚请点击刷新验证码" style="cursor : pointer;width:96px;height:24px;" onclick="javascript:this.src='{:U('Member/verify')}';"/>
						</div>
					  </div>
					  </EGT>
					  <!--
					    <div class="form-group">
					   <label for="remember"><input type="checkbox" name="remember" class="checkbox" value="1" id="remember" /> 下次自动登录</label>
					    <div>
					    	-->
					  <input name="lasturl" type="hidden" value="{$lasturl}" />
				<div class="reg-btn"><button type="submit">立即登录</button></div>
				<div class="lb-bt pad-jl">
				<a href="javascript:" class="zc-tc">立即注册</a><a href="{:U('Member/find_password')}" class="ps">忘记密码?</a>
				</div>
				</form>
			</div>
	
			
		</div>
	</div>
</div>

<!--注册弹层-->
<div class="box-zc" style="display: none;">
	<div class="register zc-reg">
		<div class="reg-block">
			<div class="caption"><h3>用户注册</h3><span class="pul-close"><img src="__TMPL__/images/modal-close.png" width="18"></span></div>
			<div class="reg-list">
			 	<form action="{:U('Member/doreg')}" name="reg_form" id="regform" method="post" class="form-horizontal">

				<div class="reg-info">
					<div class="name"><font>*</font>用户名：</div>
					<div class="rit-input"><input type="text" name="username" id="username" placeholder="请输入用户名"></div>
				</div>
				<div class="reg-info">
					<div class="name"><font>*</font>密码：</div>
					<div class="rit-input"><input type="password" id="userpwd" name="userpwd" placeholder="请输入密码"></div>
				</div>
				<div class="reg-info">
					<div class="name"><font>*</font>确认密码：</div>
					<div class="rit-input"><input type="password" name="userpwd2" id="userpwd2" placeholder="再次输入密码确认"></div>
				</div>
				<div class="reg-info">
					<div class="name"><font>*</font>Email：</div>
					<div class="rit-input"><input type="text" name="email" id="email" placeholder="请输入Email"></div>
				</div>
				<div class="reg-btn"><button type="submit">立即注册</button></div>
			<!--	<div class="agree"><label><input type="checkbox">阅读并接受<a href="javscript:">《用户注册协议》</a></label></div>-->
			</form>
			</div>
			
		</div>
	</div>
</div>
