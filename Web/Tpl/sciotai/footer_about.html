<script>

    function get_shi(id,name){

        $("input[name='prov']").val(name);

        $.ajax({

            type:"GET",

            data:{'id':id},

            url:"/Cn/Index/get_shi",

            success:function(data){

                if(data.length > 0){

                    var str = '';

                    $.each(data,function(i,v){

                        str += '<p class="set_city">'+v.name+'</p>';

                    })

                    $('#citys .mCSB_container').empty();

                    $('#citys .mCSB_container').append(str);

                    $('.set_city').click(function(){

                        $("input[name='city']").val($(this).text());

                    })
                    $('.he_h3p3xl p').click(function () {
                    var val = $(this).text();
                    $(this).parents('.he_h3p3xiala').find(".he_h3p3ubin input").attr('value', val);
                    })

                }

            }

        })

    }



    function injectChk(oField){

        re= /select|update|delete|exec|count|'|"|=|;|>|<|%/i;

        if ( re.test(oField) ){

            return false;

        }else{

            return true;

        }

    }

    checkForm={

        changeVerifyImg:function(obj){

            $(obj).attr("src","/Cn/Index/getVerifyImg.html?sid="+Math.random());

        },

        isEmpty:function(name,field,formid){

            if($('#'+formid).find('input[name="'+name+'"],textarea[name="'+name+'"]').val().length==0 || injectChk($('input[name="'+name+'"],textarea[name="'+name+'"]').val()) == false){

                layerHandel=layer.alert(

                        field+"дёҚиғҪдёәз©әпј?,

                        {

                            'title':'ж¶ҲжҒҜ',

                            'btn':['еҘҪзҡ„']

                        },function(){

                            layer.close(layerHandel);

                            $('input[name="'+name+'"]').focus();

                        }

                );

                return true;

            }else{

                return false;

            }

        },

        notEmail:function(name,field,formid){

            if(!/^[\w\-\.]+@[\w\-\.]+(\.\w+)+$/.test($('#'+formid).find('input[name="'+name+'"]').val())){

                layerHandel=layer.alert(

                        field+"ж јејҸдёҚжӯЈзЎ®пјҒ",

                        {

                            'title':'ж¶ҲжҒҜ',

                            'btn':['еҘҪзҡ„']

                        },function(){

                            layer.close(layerHandel);

                            $('input[name="'+name+'"]').focus();

                        }

                );

                return true;

            }else{

                return false;

            }

        },

        notPhone:function(name,field,formid){

            if(!/^1[\d]{10}$/.test($('#'+formid).find('input[name="'+name+'"]').val())){

                layerHandel=layer.alert(

                        field+"ж јејҸдёҚжӯЈзЎ®пјҒ",

                        {

                            'title':'ж¶ҲжҒҜ',

                            'btn':['еҘҪзҡ„']

                        },function(){

                            layer.close(layerHandel);

                            $('input[name="'+name+'"]').focus();

                        }

                );

                return true;

            }else{

                return false;

            }

        }

    };

    function submitForm(formId){
    
        $('.he_obtasli').each(function(){

            if($(this).hasClass('on')){

                $("input[name='type']").val($(this).attr('data-val'));

            }

        })

        if(checkForm.isEmpty("company","е…¬еҸёеҗҚз§°",formId)){

            return false;

        }

        if(checkForm.isEmpty("name","е§“еҗҚ",formId)){

            return false;

        }

        if(checkForm.notPhone("phone","з”өиҜқ",formId)){

            return false;

        }

        if(checkForm.notEmail("email","йӮ®з®ұ",formId)){

            return false;

        }

        if(checkForm.isEmpty("prov","зңҒд»Ҫ",formId)){

            return false;

        }

        if(checkForm.isEmpty("city","еҹҺеёӮ",formId)){

            return false;

        }

        if(checkForm.isEmpty("msg","йңҖжұӮжҸҸиҝ?,formId)){

            return false;

        }

        $.ajax({

            url:"/Cn/Index/formView.html",

            data:$("#"+formId).serialize(),

            dataType:"json",

            type:"POST",

            success:function(data){

                checkForm.changeVerifyImg($("#"+formId+" img[name='verifyImg']"));

                layer.alert(

                        data.info,

                        {

                            'title':'ж¶ҲжҒҜ',

                            'btn':['еҘҪзҡ„']

                        }

                );

                if(data.status=="success"){

                    setTimeout('location.reload()',1500);

                }

            },

            error:function(data){

                layer.open({

                    title:"и°ғиҜ•жЁЎејҸ",

                    content:data.responseText

                })

            }

        });

    }

</script>
