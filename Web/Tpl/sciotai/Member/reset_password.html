<include file="./head_inner"/>

<div class="register">
<div class="reg-block">
		<div class="caption"><h3>重置密码</h3>
		</div>
		<div class="reg-list">
 	<form role="form" action="{:U('Member/reset_password')}" method="post">
	<input name="username" type="hidden" value="{$_GET['username']}" />
	<input name="email" type="hidden" value="{$_GET['email']}" />
	<input name="hash" type="hidden" value="{$_GET['hash']}" />
	<input name="addtime" type="hidden" value="{$_GET['addtime']}" />
				<div class="reg-info">
					<div class="name"><font>*</font>用户名：</div>
				    {$_GET['username']}
				  </div>
  
				 <div class="reg-info">
				   <div class="name"><font>*</font>新密码：</div>
				   <div class="rit-input">
				      <input type="password" id="newpwd" name="newpwd"  placeholder="您的新密码">
				    </div>
				  </div>
  
				   <div class="reg-info">
				   <div class="name"><font>*</font>确认密码：</div>
				   <div class="rit-input">
				      <input type="password" id="newpwd2" name="newpwd2"  placeholder="再次输入您的新密码确认密码">
				    </div>
				  </div>
  
  
  
				  <div class="reg-btn">
				  <button type="submit">确定修改</button> 
				  </div>
				</form>
  </div>
					  
<br><br>
</div>
</div>
</div>
</div>

</div>
<include file="$footer"/>
