<include file="./head_inner"/>

	<div class="crumb"><span>你的位置：{$nav} > 文档查看</span></div>
<div class="width-block">
	
	<div class="text-field">
		<h2>{$article.title}<present name="nowpage">({$nowpage})</present></h2>
		<ul>
			<li><span>文章来源：</span>	<div class="bule">{$article.copyfrom}</div></li>
			<li><span>发布日期：</span>	<div>{$article.addtime}</div></li>
		<!--	<li><span>生效日期：</span>	<div>{$article.effectivedate}</div></li>
			<li><span>时效性：</span><div>尚未生效</div></li>
			<li><span>文号：</span><div>主席令第二十六号</div></li>
			<li><span>编辑提示：</span>	<div>......</div></li>
			-->
		</ul>
	</div>
	
	<div class="text-conent">
		<h3>【文章正文】</h3>
		<div class="text-info">
			<h2 style="font-size: 22px;" align="center"><b><notempty name="article.titlecolor"><font color="{$article.titlecolor}"></notempty>{$article.title}<present name="nowpage">({$nowpage})</present><notempty name="article.titlecolor"></font></notempty></b></h2>
			
						{$article.content}

			
			<!--详细页的分页自己美化-->
			<div class="clearfix">{$page}</div>
			
	
			<div class="prenext">{$updown}</div>
		
				
							<!--评论区-->

							<div class="IntroTitle">评论</div>
							<div class='clearfix'></div>
					    <link href="__TMPL__/css/pl.css" rel="stylesheet" type="text/css"/>
					    <div id="pinglun">
								  <div id="pinglunt">以下是网友对 <span class="blue">{$article.title}</span> 的评论：</div>
								  <div id="list"></div>
								  <div id="MultiPage"></div><!--评论分页 -->
					              <div id="pinglunother">
					               <div id="pinglunym"></div><!--评论信息 -->
					              </div>
					              <div id="pinglunfb">
								  <div id="pinglunfbt">发表评论</div>
								  <input type="hidden" name="aid" id="aid" value="{$article.aid}">
								  <textarea rows="20" name="content" cols="50"  style="width:100%; height:90px; border:1px solid #e6e6e6;" id="plContent"></textarea>
								  <div class="qdfb">大名:<input name="author" class="button" type="text" value="<neq name='_SESSION.cms_username' value=''>{$_SESSION.cms_username}<else/>游客</neq>" id="Author"  maxlength="20" size="12"/>
								  <input type="button" value="确认发表" name="submit"  id="sendGuest" class="button submit" onClick="AddNew()"></div>
								  </div>
					    </div>
							<script type="text/javascript" src="__TMPL__/js/ajaxpl.js"></script>
							<script>
							var root = '__ROOT__';
							$(function()
							{
								showre({$article.aid},1);
								$('#page_hits').load('{:U('Api/hits_js?aid='.$article['aid'])}');
								$('#dianzhan_num_{$article.aid}').load('{:U('Api/hits_js?type=1&aid='.$article['aid'])}');
							});
							</script>
							<br>    

				
		</div>
	</div>
	
</div>

<include file="$footer"/>

</body>

</html>
