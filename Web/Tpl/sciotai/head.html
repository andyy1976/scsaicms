<script>
function search() {
    var keyword = document.getElementById('keywords').value;
    if(keyword) {
        location.href = '/index.php?s=/search/keyword/' + encodeURIComponent(keyword) + '.html';
    }
}
// 回车搜索
document.getElementById('keywords').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') {
        search();
    }
});
</script>
