<include file="./head_ps" />


	<style>
		:root {
			--primary-color: #2A5CAA;
			--secondary-color: #3AB0FF;
			--accent-color: #FFB72B;
			--text-dark: #2C3E50;
			--text-light: #FFFFFF;
		}

		/* 新增动画效果 */
		@keyframes pulse {
			0% {
				transform: scale(1);
			}

			50% {
				transform: scale(1.05);
			}

			100% {
				transform: scale(1);
			}
		}

		.realtime-metrics {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
			gap: 2rem;
			margin: 3rem 0;
			background: rgba(42, 92, 170, 0.1);
			padding: 2rem;
			border-radius: 12px;
		}

		.metric {
			text-align: center;
			padding: 1rem;
			background: white;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.1);
			transition: all 0.3s;
		}

			.metric:hover {
				transform: translateY(-5px);
			}

		.value {
			font-size: 2.5rem;
			font-weight: bold;
			color: var(--primary-color);
			background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		/* AR预览样式 */
		.ar-section {
			position: relative;
			height: 500px;
			margin: 4rem 0;
			border-radius: 16px;
			overflow: hidden;
		}

		.ar-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0,0,0,0.7);
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			color: white;
			opacity: 0;
			transition: opacity 0.3s;
		}

		.ar-section:hover .ar-overlay {
			opacity: 1;
		}

		/* 增强案例卡片 */
		.case-card {
			position: relative;
			cursor: pointer;
			perspective: 1000px;
		}

		.case-inner {
			position: relative;
			width: 100%;
			height: 100%;
			transition: transform 0.6s;
			transform-style: preserve-3d;
		}

		.case-card:hover .case-inner {
			transform: rotateY(180deg);
		}

		.case-front, .case-back {
			position: absolute;
			width: 100%;
			height: 100%;
			backface-visibility: hidden;
		}

		.case-back {
			background: white;
			transform: rotateY(180deg);
			padding: 1.5rem;
		}
	</style>

	<!-- 新增实时数据看板 -->
	<div class="realtime-metrics">
		<div class="metric">
			<div class="value" id="connectedDevices">0</div>
			<div class="label">在线设备</div>
		</div>
		<div class="metric">
			<div class="value" id="dailyOutput">0</div>
			<div class="label">日产量</div>
		</div>
		<div class="metric">
			<div class="value" id="defectRate">0%</div>
			<div class="label">不良率</div>
		</div>
	</div>

	<!-- 增强型案例展示 -->
	<div class="case-card">
		<div class="case-inner">
			<div class="case-front">
				<div class="case-image" style="background-image: url('assets/case1.jpg')"></div>
				<h3>将军红5G酒厂</h3>
			</div>
			<div class="case-back">
				<h4>转型成果</h4>
				<ul>
					<li>生产效率提升60%</li>
					<li>能耗降低20%</li>
					<li>质量追溯效率提升300%</li>
				</ul>
				<button class="ar-trigger">AR查看方案</button>
			</div>
		</div>
	</div>

	<!-- AR预览模块 -->
	<div class="ar-section">
		<div class="ar-overlay">
			<h3>数字孪生工厂预览</h3>
			<p>扫描二维码体验AR效果</p>
			<img src="assets/qr-code.png" alt="AR二维码" class="ar-qr">
		</div>
	</div>

	<!-- 数据可视化图表 -->
	<div id="performanceChart"></div>

	<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
	<script>
		// 实时数据模拟
		function updateMetrics() {
			document.getElementById('connectedDevices').textContent =
				Math.floor(Math.random() * 500 + 1500);
			document.getElementById('dailyOutput').textContent =
				(Math.random() * 500 + 1500).toFixed(0);
			document.getElementById('defectRate').textContent =
				(Math.random() * 0.5).toFixed(1) + '%';
		}
		setInterval(updateMetrics, 3000);

		// 性能图表初始化
		const chartOptions = {
			chart: {
				type: 'radar',
				height: 400
			},
			series: [{
				name: '技术指标',
				data: [95, 80, 90, 85, 75, 88]
			}],
			labels: ['系统集成', '数据可视化', '设备连接', '质量控制', '流程优化', '可扩展性'],
			colors: ['00298e','332255'],
		markers: {
			size: 4,
				colors: ['#fff'],
					strokeWidth: 2
		}
			};

		const chart = new ApexCharts(
			document.querySelector("#performanceChart"),
			chartOptions
		);
		chart.render();

		// AR交互功能
		document.querySelectorAll('.ar-trigger').forEach(btn => {
			btn.addEventListener('click', () => {
				launchARViewer('factory-model.glb');
			});
		});

		function launchARViewer(modelPath) {
			// 实际部署时集成AR.js或模型查看器
			window.location.href = `intent://arvr/${modelPath}#Intent;scheme=scsai;package=com.example.arviewer;end`;
		}

		// 视差滚动效果
		window.addEventListener('scroll', () => {
			const scrolled = window.pageYOffset;
			document.querySelector('.ar-section').style.backgroundPositionY =
				`${scrolled * 0.5}px`;
		});
	</script>
