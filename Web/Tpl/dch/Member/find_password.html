<include file="./head_inner"/>

<div class="register">
	<div class="reg-block">
		<div class="caption"><h3>找回密码</h3>
		</div>
		<div class="reg-list">
 	<form role="form" action="{:U('Member/find_password')}" method="post">
				<div class="reg-info">
					<div class="name"><font>*</font>用户名：</div>
					<div class="rit-input"><input type="text" name="username" placeholder="请输入用户名"></div>
  </div>
				<div class="reg-info">
					<div class="name"><font>*</font>注册邮箱：</div>
					<div class="rit-input">
    				<input type="text" name="email"  placeholder="输入注册邮件">
					</div>
						  </div>
					  	<div class="reg-info">
					  <div class="name"><font>*</font>验证码：</div>
					   	<div class="rit-input">
						 <input type="text" name="verify"  placeholder="输入下面验证码"> 
						<img src="{:U('Member/verify')}" border="0" alt="看不清楚请点击刷新验证码" style="cursor : pointer;width:96px;height:24px;" onclick="javascript:this.src='{:U('Member/verify')}';"/>
						</div>
 
					  </div>

				<div class="reg-btn">
				<button type="submit">找回密码</button>
				</div>

</form>
  </div>
					  
<br><br>
</div>
</div>
</div>
</div>

</div>
<include file="$footer"/>
