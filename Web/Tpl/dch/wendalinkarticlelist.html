<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="content-type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>
关联文章
</title>
<link href="__TMPL__css/bootstrap.min.css" rel="stylesheet" type="text/css"/>
<link href="__TMPL__css/main.css" rel="stylesheet" type="text/css"/>

<script src="__TMPL__js/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="__TMPL__js/bootstrap.min.js" type="text/javascript"></script>



</head>
<body>

<div class="second">
	<div class="width-block">
	
		<div class="row" style="margin-top:1px;">

		  <div class="right_con">

				<table border="0" cellspacing="2" cellpadding="3"  align="center" class="table table-bordered">
				    <tr>
				      <td height="25" bgcolor="f7f7f7">快速查找：</td>
				      <td align="center" bgcolor="f7f7f7" valign="top">
					  	<form name="form1" method="POST" action="__URL__/search">
				        <input name="keywords" type="text" id="keyword" value="" class="s26">
				        <input type="submit" class="btn btn-danger btn-sm" value="搜索">
				      </form>
				      </td>
				    </tr>
				</table>
				<form name="myform" id="myform" method="POST" action="__URL__/delall">
					<table width="95%" border="0"  align=center cellpadding="3" cellspacing="1" bgcolor="#F2F9E8" class="table table-bordered">

				    <tr bgcolor="#f1f3f5" style="font-weight:bold;">
				 
				    <td width="75%" align="center" class="ButtonList">文章名称</td>

				    <td width="15%" height="25" align="center" class="ButtonList">管理</td>    
				    </tr>
						<volist name="list" id="vo"> 
					
					
					    <td height="25">[<a href="#">{$vo.typename}</a>]<a href="{$vo.aid|url=articles,###}" target="_blank">{$vo.title}</a></td>
					   
					    <td align="center"><a href="__APP__/Wenda/answer/qid/{$_GET[qid]}/&typeid={$_GET[typeid]}&aid={$vo.aid}">关联问题</a></td>
					    </tr>
						</volist>
						<tr>
							<td bgcolor="f7f7f7" colspan="5">

								<div class="page-al">
									<div class="dataTables_paginate pagination">
									    <nav>
											<ul class="pagination">
											{$page}
											</ul>
				 							</nav>
									</div>
								</div>

							</td>
						</tr>
						</table>
				</form>
			</div>
		</div>
	</div>
</div>

</body>
</html>
