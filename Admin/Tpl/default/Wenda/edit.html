<!DOCTYPE html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>网站后台管理</title>
<link href="__PUBLIC__/Admin/images/Admin_css.css" type=text/css rel=stylesheet>
<link rel="shortcut icon" href="__PUBLIC__/Admin/images/myfav.ico" type="image/x-icon" />
<import file= "Admin.js.admin,Admin.js.Ajax,Admin.js.Jquery"/> 
</head>
<body>
	


	<table width="95%" border="0"  align=center cellpadding="3" cellspacing="2" bgcolor="#FFFFFF" class="table table-bordered">

<form name="myform" action="__URL__/doedit" method=post>
<tr> 
    <td colspan="5" class="admintitle">修改问答</td>
</tr>
<tr>
  <td bgcolor="#f7f7f7">提问人</td>
  <td colspan=4 bgcolor="#f7f7f7" class=td><input name="author" type="text" class="inputbg" id="author" value="{$list.author}" size="30"></td>
</tr>
 <tr>
<td bgcolor="#f7f7f7">问题分组</td>
  <td colspan=4 bgcolor="#f7f7f7" class=td>
  	<select class="form-control" name="group_id">
	<option value="0">请选择</option>
	<arclist model="wenda_group" id="vo">
	<option value="{$vo.group_id}" <eq name="list.group_id" value="$vo[group_id]">selected="selected"</eq>>{$vo.group_name}</option>
	</arclist>
	</select>
	</td>
</tr>
<tr>
  <td bgcolor="#f7f7f7">提问时间</td>
  <td colspan=4 bgcolor="#f7f7f7" class=td>{$list.addtime}</td>
</tr>
<tr>
  <td bgcolor="#f7f7f7">问题</td>
  <td colspan=4 bgcolor="#f7f7f7" class=td>
  <textarea name="content" cols="80" rows="10" id="content">{$list.content}</textarea></td>
</tr>
<tr>
  <td bgcolor="#f7f7f7">答案</td>
  <td colspan=4 bgcolor="#f7f7f7" class=td>
  <textarea name="recontent" cols="80" rows="10" id="recontent">{$list.recontent}</textarea></td>
</tr>
<tr>
  <td bgcolor="#f7f7f7">法律依据</td>
  <td colspan=4 bgcolor="#f7f7f7" class=td>
  <textarea name="approval" cols="80" rows="10" id="approval">{$list.approval}</textarea></td>
  <td>  <a class="btn btn-info btn-sm" href="__APP__/Article/index/typeid/2/&qid={$list.id}">关联文章</a></td>
</tr>
<tr>
  <td bgcolor="#f7f7f7">操作指引</td>
  <td colspan=4 bgcolor="#f7f7f7" class=td>
  <textarea name="guide" cols="80" rows="10" id="guide">{$list.guide}</textarea></td>
</tr>
<tr>
  <td bgcolor="#f7f7f7">典型案例</td>
  <td colspan=4 bgcolor="#f7f7f7" class=td>
  <textarea name="cases" cols="80" rows="10" id="cases">{$list.cases}</textarea></td>
  <td>  <a class="btn btn-info btn-sm" href="__APP__/Article/index/typeid/3/&qid={$list.id}">关联文章</a></td>
 
</tr>
<tr> 
<td width="20%"></td>
<td colspan=4 class=td>
	<input name="id" type="hidden" value="{$list.id}">
	<input type="hidden" name="approvalid" value="{$list.approvalurl}">
<input type="hidden" name="casesid" value="{$list.casesurl}">
<input name="submit" type="submit" class="btn btn-success" value="提 交">  <input name="Submit22" type="button" class="btn btn-info" onClick="history.go(-1)" value="返 回">  </td>
</tr>
</form>
</table>

</body>
</html>
