function mkCard(s){
var dt=s.deps.map(d=>'<span class="tt">'+d+'</span>').join('');
var rq=s.reqs.map(r=>'<span class="rt">'+r+'</span>').join('');
var ir=s.ins.map(i=>'<div class="f"><div class="fl">'+i.n+' <span style="color:'+(i.r==="必填"?"#ef9a9a":"#455a60")+'">（'+i.r+'）</span><code>'+i.t+'</code></div><div class="fv">'+i.d+'</div></div>').join('');
var or=s.outs.map(o=>'<div class="fv">• '+o+'</div>').join('');
return '<div class="sk" data-role="'+s.role+'" data-batch="'+s.batch+'" data-name="'+s.name+'" data-id="'+s.id+'" data-reqs="'+s.reqs.join(' ')+'">'+
'<div class="sk-h" onclick="this.parentElement.classList.toggle(\'open\')">'+
'<div class="sk-i '+s.role+'">'+RM[s.role].emoji+'</div>'+
'<div class="sk-m"><div class="sk-id">'+s.id+'</div><div class="sk-n">'+s.name+'</div><div class="sk-r">'+s.rn+' · '+BM[s.batch]+'</div></div>'+
'<div class="sk-req"><span class="rc">'+s.reqs.length+'项REQ</span><span class="ei">▼</span></div></div>'+
'<div class="sk-b"><div class="sk-d"></div>'+
'<div class="f"><div class="fl">技能描述</div><div class="fv">'+s.desc+'</div></div>'+
'<div class="f"><div class="fl">对应需求ID</div><div class="rts">'+rq+'</div></div>'+
'<div class="f"><div class="fl">输入参数</div>'+ir+'</div>'+
'<div class="f"><div class="fl">输出成果</div>'+or+'</div>'+
'<div class="f"><div class="fl">依赖原子能力</div><div class="fv" style="margin-top:3px">'+dt+'</div></div>'+
'<div class="f"><div class="fl">可复用范围</div><div class="fv">'+s.reuse+'</div></div>'+
'<div class="f"><div class="fl">验收指标</div><div class="fv">'+s.kpi+'</div></div>'+
'<div class="f"><div class="fl">典型调用示例</div><div class="je"><pre>'+s.ex.replace(/</g,'&lt;')+'</pre></div></div>'+
'</div></div>';
}

function showTab(id){
document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
document.getElementById('tab-'+id).classList.add('active');
document.querySelector('[data-tab="'+id+'"]').classList.add('active');
var f=document.getElementById('filters');
f.style.display=(id!=='matrix')?'flex':'none';
if(id!=='matrix')filt();
}

function filt(){
var q=document.getElementById('si').value.toLowerCase();
var r=document.getElementById('rf').value;
var b=document.getElementById('bf').value;
var act=document.querySelector('.tc.active');
if(!act)return;
act.querySelectorAll('.sk').forEach(function(c){
var mn=!q||c.dataset.name.toLowerCase().includes(q)||c.dataset.id.toLowerCase().includes(q)||c.dataset.reqs.toLowerCase().includes(q);
var mr=!r||c.dataset.role===r;
var mb=!b||c.dataset.batch===b;
c.style.display=(mn&&mr&&mb)?'':'none';
});
}

function renderOverview(){
// Role cards
var rg=document.getElementById('roleGrid');
var rh='';
Object.keys(RM).forEach(function(k){
var cnt=S.filter(function(s){return s.role===k}).length;
var reqc=[...new Set(S.filter(function(s){return s.role===k}).flatMap(function(s){return s.reqs}))].length;
rh+='<div class="ov-item" onclick="document.getElementById(\'rf\').value=\''+k+'\';filt()"><div class="ov-emoji">'+RM[k].emoji+'</div><div class="ov-name">'+RM[k].name+'</div><div class="ov-count">'+cnt+'项技能 · '+reqc+'项REQ</div></div>';
});
rg.innerHTML=rh;
// All cards
document.getElementById('ov-grid').innerHTML=S.map(mkCard).join('');
}

function renderBatches(){
var b1h='',b2h='',b3h='';
var lastRole1='',lastRole2='',lastRole3='';
S.forEach(function(s){
var card=mkCard(s);
var sh='';
if(s.batch===1){
if(s.role!==lastRole1){sh='<div class="sh"><div class="si '+s.role+'">'+RM[s.role].emoji+'</div><div class="st"><h2>'+s.rn+'</h2><p>'+RM[s.role].desc+'</p></div><span class="sc">'+S.filter(function(x){return x.role===s.role&&x.batch===1}).length+'项</span></div>';lastRole1=s.role;}
b1h+=sh+card;
}else if(s.batch===2){
if(s.role!==lastRole2){sh='<div class="sh"><div class="si '+s.role+'">'+RM[s.role].emoji+'</div><div class="st"><h2>'+s.rn+'</h2><p>'+RM[s.role].desc+'</p></div><span class="sc">'+S.filter(function(x){return x.role===s.role&&x.batch===2}).length+'项</span></div>';lastRole2=s.role;}
b2h+=sh+card;
}else{
if(s.role!==lastRole3){sh='<div class="sh"><div class="si '+s.role+'">'+RM[s.role].emoji+'</div><div class="st"><h2>'+s.rn+'</h2><p>'+RM[s.role].desc+'</p></div><span class="sc">'+S.filter(function(x){return x.role===s.role&&x.batch===3}).length+'项</span></div>';lastRole3=s.role;}
b3h+=sh+card;
}
});
document.getElementById('tab-b1').innerHTML='<div class="sg">'+b1h+'</div>';
document.getElementById('tab-b2').innerHTML='<div class="sg">'+b2h+'</div>';
document.getElementById('tab-b3').innerHTML='<div class="sg">'+b3h+'</div>';
}

function renderMatrix(){
var h='';
S.forEach(function(s){
var rt=s.reqs.map(function(r){return '<span class="rt">'+r+'</span>';}).join('');
h+='<tr><td class="snc">'+s.id+'</td><td>'+s.name+'</td><td>'+s.rn+'</td><td style="font-size:.72rem">'+BM[s.batch]+'</td><td style="text-align:center">'+s.reqs.length+'</td><td class="rcs">'+rt+'</td></tr>';
});
// Summary rows
var totalReqs=[...new Set(S.flatMap(function(s){return s.reqs}))].length;
h+='<tr style="background:rgba(255,255,255,.03)"><td colspan="4" style="font-weight:600;color:#4fc3f7">合计 · 30项技能</td><td style="text-align:center;font-weight:700;color:#4fc3f7">'+S.reduce(function(a,s){return a+s.reqs.length},0)+'</td><td style="color:#4fc3f7">覆盖'+totalReqs+'项需求（100%）</td></tr>';
document.getElementById('mb').innerHTML=h;
}

// Nav click
document.querySelectorAll('.nav button').forEach(function(btn){
btn.addEventListener('click',function(){showTab(this.dataset.tab);});
});

// Init
renderOverview();
renderBatches();
renderMatrix();
</script>
